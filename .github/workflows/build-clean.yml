name: Build OpenWRT with Passwall2

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'OpenWRT branch'
        required: true
        default: 'v23.05.3'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Configure Git
      run: |
        git config --global http.sslBackend "openssl"
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999
        git config --global --unset http.proxy || true
        git config --global --unset https.proxy || true

    - name: Clone OpenWRT
      run: |
        git clone --depth 1 https://git.openwrt.org/openwrt/openwrt.git openwrt
        cd openwrt
        git fetch --depth 1 origin ${{ github.event.inputs.branch }}
        git checkout ${{ github.event.inputs.branch }}

    - name: Configure feeds
      run: |
        cd openwrt
        cat > feeds.conf << 'EOF'
        src-git packages https://git.openwrt.org/feed/packages.git
        src-git luci https://git.openwrt.org/project/luci.git
        src-git routing https://git.openwrt.org/feed/routing.git
        src-git telephony https://git.openwrt.org/feed/telephony.git
        src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2.git
        EOF

    - name: Update feeds
      run: |
        cd openwrt
        timeout 600s ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate config
      run: |
        cd openwrt
        echo 'CONFIG_TARGET_x86_64=y' > .config
        echo 'CONFIG_TARGET_x86_64_Generic=y' >> .config
        echo 'CONFIG_TARGET_ROOTFS_EXT4FS=y' >> .config
        echo 'CONFIG_PACKAGE_luci=y' >> .config
        echo 'CONFIG_PACKAGE_luci-app-passwall2=y' >> .config
        make defconfig

    - name: Download sources
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Build
      run: |
        cd openwrt
        make -j$(nproc) V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware
        path: openwrt/bin/targets/
        retention-days: 30
