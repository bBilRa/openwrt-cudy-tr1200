name: Build OpenWRT

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone OpenWRT
      run: |
        git clone https://git.openwrt.org/openwrt/openwrt.git openwrt
        cd openwrt
        git checkout v23.05.2  # или нужная версия

    - name: Configure feeds
      run: |
        cd openwrt
        # Используем только стабильные фиды
        cat > feeds.conf << 'EOF'
        src-git packages https://git.openwrt.org/feed/packages.git
        src-git luci https://git.openwrt.org/project/luci.git
        src-git routing https://git.openwrt.org/feed/routing.git
        src-git telephony https://git.openwrt.org/feed/telephony.git
        EOF

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add custom feeds (optional)
      run: |
        cd openwrt
        # Добавляем passwall2 через ретраи
        for i in 1 2 3; do
          echo "Попытка $i добавить passwall2..."
          echo "src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2.git" >> feeds.conf
          if ./scripts/feeds update passwall2; then
            ./scripts/feeds install -a -p passwall2
            break
          else
            echo "Не удалось, удаляем строку и пробуем снова"
            sed -i '/passwall2/d' feeds.conf
            sleep 10
          fi
        done

    - name: Generate config
      run: |
        cd openwrt
        echo 'CONFIG_TARGET_x86_64=y' > .config
        echo 'CONFIG_TARGET_x86_64_Generic=y' >> .config
        make defconfig

    - name: Download sources
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Build
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: openwrt-firmware
        path: openwrt/bin/targets/
